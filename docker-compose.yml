services:
  python-project:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - ORACLE_DSN=oracle-db:1521/FREEPDB1
      - ORACLE_ADMIN_PASSWORD=OraclePwd_2025
    stdin_open: true
    tty: true
    depends_on:
      model:
        condition: service_started
      oracle-db:
        condition: service_healthy

  oracle-db:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: oracle_free
    environment:
      - ORACLE_PASSWORD=OraclePwd_2025
    ports:
      - "1521:1521"
      - "5500:5500"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - oracle_data:/opt/oracle/oradata

  model:
    image: vllm/vllm-openai:latest
    container_name: model_container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/app/models
    ipc: host
    command:
      [
        "--model", "openai/gpt-oss-20b",
        "--port", "8000",
        "--tensor_parallel_size=1",
        "--seed", "42",
        "--enable-auto-tool-choice",
        "--tool-call-parser", "openai",
        "--generation-config", "vllm"
      ]
    volumes:
      - model_cache:/app/models

volumes:
  model_cache:
    name: vea_model_cache
  oracle_data:
    name: vea_oracle_data
